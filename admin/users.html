<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пользователи - Админка Vibecoding</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- Login Screen -->
  <div class="login-container" id="loginScreen">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h1 class="login-title">Админ-панель</h1>
      <p class="login-subtitle">Проверка доступа...</p>
      <div class="loading">
        <div class="spinner"></div>
      </div>
      <p class="login-error" id="loginError">Доступ запрещён</p>
    </div>
  </div>

  <!-- Admin Layout -->
  <div class="admin-layout" id="adminLayout" style="display: none;">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <span class="admin-logo-icon">👑</span>
        <span class="admin-logo-text">Админка</span>
      </div>

      <nav>
        <ul class="admin-nav">
          <li class="admin-nav-item">
            <a href="index.html" class="admin-nav-link">
              <span class="admin-nav-icon">📊</span>
              <span class="admin-nav-label">Дашборд</span>
            </a>
          </li>
          <li class="admin-nav-item">
            <a href="users.html" class="admin-nav-link active">
              <span class="admin-nav-icon">👥</span>
              <span class="admin-nav-label">Пользователи</span>
            </a>
          </li>
          <li class="admin-nav-item">
            <a href="cohorts.html" class="admin-nav-link">
              <span class="admin-nav-icon">🎓</span>
              <span class="admin-nav-label">Потоки</span>
            </a>
          </li>
          <li class="admin-nav-item">
            <a href="modules.html" class="admin-nav-link">
              <span class="admin-nav-icon">📚</span>
              <span class="admin-nav-label">Модули</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="admin-sidebar-footer">
        <a href="../index.html" class="admin-back-link">
          ← <span>Вернуться на курс</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <h1 class="admin-page-title">Пользователи</h1>
        <div class="admin-user">
          <span class="admin-user-email" id="adminEmail"></span>
          <button class="admin-logout-btn" id="logoutBtn">Выйти</button>
        </div>
      </header>

      <!-- Actions Bar -->
      <div class="card" style="margin-bottom: 1.5rem;">
        <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
          <button class="btn btn-primary" id="addUserBtn">
            ➕ Добавить пользователя
          </button>
          <div class="search-box" style="flex: 1; min-width: 200px; margin-bottom: 0;">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск по email или имени...">
          </div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="card">
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th>Пользователь</th>
                <th>Email</th>
                <th>Поток</th>
                <th>Роль</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="usersTable">
              <tr>
                <td colspan="6" class="loading">
                  <div class="spinner"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Добавить пользователя</h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>

      <form id="userForm">
        <input type="hidden" id="userId">

        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" class="form-input" id="userEmail" placeholder="user@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Имя</label>
          <input type="text" class="form-input" id="userName" placeholder="Иван Иванов">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Поток</label>
            <select class="form-select" id="userCohort">
              <option value="">Без потока</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Роль</label>
            <select class="form-select" id="userRole">
              <option value="student">Студент</option>
              <option value="instructor">Инструктор</option>
              <option value="admin">Администратор</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <input type="checkbox" id="userActive" checked>
            <span>Активный пользователь</span>
          </label>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <!-- User Progress Modal -->
  <div class="modal-overlay" id="progressModal">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <h2 class="modal-title">Прогресс пользователя</h2>
        <button class="modal-close" id="closeProgressModal">&times;</button>
      </div>

      <div id="progressContent">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="js/admin-api.js"></script>

  <script>
    // State
    let users = [];
    let cohorts = [];
    let editingUserId = null;

    // Elements
    const loginScreen = document.getElementById('loginScreen');
    const loginError = document.getElementById('loginError');
    const adminLayout = document.getElementById('adminLayout');
    const adminEmail = document.getElementById('adminEmail');
    const logoutBtn = document.getElementById('logoutBtn');
    const toast = document.getElementById('toast');

    const usersTable = document.getElementById('usersTable');
    const searchInput = document.getElementById('searchInput');
    const addUserBtn = document.getElementById('addUserBtn');

    const userModal = document.getElementById('userModal');
    const modalTitle = document.getElementById('modalTitle');
    const userForm = document.getElementById('userForm');
    const closeModal = document.getElementById('closeModal');
    const cancelBtn = document.getElementById('cancelBtn');

    const progressModal = document.getElementById('progressModal');
    const progressContent = document.getElementById('progressContent');
    const closeProgressModal = document.getElementById('closeProgressModal');

    // Module names from config (единый источник)
    function getModuleName(id) {
      return COURSE_CONFIG.getModuleTitle(id);
    }

    async function init() {
      if (!SupabaseClient.isSupabaseConfigured()) {
        // Fallback mode
        if (localStorage.getItem('adminAuth') !== 'true') {
          window.location.href = 'index.html';
          return;
        }
        showFallbackUsers();
        return;
      }

      const isAuthorized = await AdminAPI.init();

      if (!isAuthorized) {
        loginError.classList.add('show');
        return;
      }

      loginScreen.style.display = 'none';
      adminLayout.style.display = 'flex';

      const admin = AdminAPI.getCurrentAdmin();
      adminEmail.textContent = admin.email;

      await loadData();
    }

    function showFallbackUsers() {
      loginScreen.style.display = 'none';
      adminLayout.style.display = 'flex';
      adminEmail.textContent = 'Администратор (локальный режим)';

      // Преобразуем данные из config.js в формат users
      users = [];
      cohorts = COURSE_CONFIG.cohorts.map(c => ({
        id: c.id,
        name: c.name
      }));

      COURSE_CONFIG.cohorts.forEach(cohort => {
        cohort.students.forEach(email => {
          users.push({
            id: email,
            email: email,
            name: null,
            cohort_id: cohort.id,
            cohort: { name: cohort.name },
            role: COURSE_CONFIG.isAdmin(email) ? 'admin' : 'student',
            is_active: true
          });
        });
      });

      // Добавляем админов, которых нет в потоках
      COURSE_CONFIG.admins.forEach(email => {
        if (!users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
          users.push({
            id: email,
            email: email,
            name: null,
            cohort_id: null,
            cohort: null,
            role: 'admin',
            is_active: true
          });
        }
      });

      renderUsers();
      populateCohortSelect();

      // Отключаем кнопку добавления (только просмотр в fallback)
      addUserBtn.innerHTML = '📋 Редактируйте config.js';
      addUserBtn.disabled = true;
      addUserBtn.style.opacity = '0.5';
      addUserBtn.style.cursor = 'not-allowed';
    }

    async function loadData() {
      [users, cohorts] = await Promise.all([
        AdminAPI.getUsers(),
        AdminAPI.getCohorts()
      ]);

      renderUsers();
      populateCohortSelect();
    }

    function renderUsers(filter = '') {
      const filtered = filter
        ? users.filter(u =>
            u.email.toLowerCase().includes(filter) ||
            (u.name && u.name.toLowerCase().includes(filter))
          )
        : users;

      if (filtered.length === 0) {
        usersTable.innerHTML = `
          <tr>
            <td colspan="6" class="empty-state">
              <div class="empty-state-icon">👥</div>
              <div class="empty-state-title">Пользователи не найдены</div>
            </td>
          </tr>
        `;
        return;
      }

      usersTable.innerHTML = filtered.map(user => {
        const roleLabels = { student: 'Студент', instructor: 'Инструктор', admin: 'Админ' };
        const roleBadges = { student: 'info', instructor: 'warning', admin: 'success' };

        return `
          <tr>
            <td>
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <div class="user-avatar">${(user.name || user.email)[0].toUpperCase()}</div>
                <span>${user.name || '-'}</span>
              </div>
            </td>
            <td>${user.email}</td>
            <td>${user.cohort?.name || '-'}</td>
            <td><span class="badge badge-${roleBadges[user.role]}">${roleLabels[user.role]}</span></td>
            <td><span class="badge badge-${user.is_active ? 'success' : 'danger'}">${user.is_active ? 'Активен' : 'Неактивен'}</span></td>
            <td>
              <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-secondary btn-sm" onclick="viewProgress('${user.id}')">📊</button>
                <button class="btn btn-secondary btn-sm" onclick="editUser('${user.id}')">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')">🗑️</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function populateCohortSelect() {
      const select = document.getElementById('userCohort');
      select.innerHTML = '<option value="">Без потока</option>' +
        cohorts.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    // Search
    searchInput.addEventListener('input', (e) => {
      renderUsers(e.target.value.toLowerCase());
    });

    // Add User
    addUserBtn.addEventListener('click', () => {
      editingUserId = null;
      modalTitle.textContent = 'Добавить пользователя';
      userForm.reset();
      document.getElementById('userActive').checked = true;
      userModal.classList.add('show');
    });

    // Edit User
    window.editUser = async (userId) => {
      const user = users.find(u => u.id === userId);
      if (!user) return;

      editingUserId = userId;
      modalTitle.textContent = 'Редактировать пользователя';

      document.getElementById('userEmail').value = user.email;
      document.getElementById('userName').value = user.name || '';
      document.getElementById('userCohort').value = user.cohort_id || '';
      document.getElementById('userRole').value = user.role;
      document.getElementById('userActive').checked = user.is_active;

      userModal.classList.add('show');
    };

    // Delete User
    window.deleteUser = async (userId) => {
      const user = users.find(u => u.id === userId);
      if (!user) return;

      if (!confirm(`Удалить пользователя ${user.email}?`)) return;

      const result = await AdminAPI.deleteUser(userId);

      if (result.success) {
        showToast('Пользователь удалён');
        await loadData();
      } else {
        showToast(result.error || 'Ошибка удаления', true);
      }
    };

    // View Progress
    window.viewProgress = async (userId) => {
      progressModal.classList.add('show');
      progressContent.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      const user = users.find(u => u.id === userId);
      const progress = await AdminAPI.getUserProgress(userId);

      // Group by module
      const byModule = {};
      for (const item of progress) {
        if (!byModule[item.module_id]) {
          byModule[item.module_id] = [];
        }
        byModule[item.module_id].push(item.lesson_id);
      }

      let html = `
        <h3 style="margin-bottom: 1rem;">${user?.name || user?.email}</h3>
      `;

      if (Object.keys(byModule).length === 0) {
        html += `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-title">Нет прогресса</div>
          </div>
        `;
      } else {
        html += '<div style="display: flex; flex-direction: column; gap: 1rem;">';

        for (let moduleId = 1; moduleId <= 12; moduleId++) {
          const lessons = byModule[moduleId] || [];
          const percent = Math.round((lessons.length / 8) * 100); // Assuming 8 lessons per module

          html += `
            <div>
              <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span>${moduleId}. ${getModuleName(moduleId)}</span>
                <span style="color: #6b7280;">${lessons.length} уроков</span>
              </div>
              <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: ${percent}%"></div>
              </div>
            </div>
          `;
        }

        html += '</div>';
      }

      progressContent.innerHTML = html;
    };

    // Form Submit
    userForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const userData = {
        email: document.getElementById('userEmail').value,
        name: document.getElementById('userName').value || null,
        cohort_id: document.getElementById('userCohort').value || null,
        role: document.getElementById('userRole').value,
        is_active: document.getElementById('userActive').checked
      };

      let result;
      if (editingUserId) {
        result = await AdminAPI.updateUser(editingUserId, userData);
      } else {
        result = await AdminAPI.createUser(userData);
      }

      if (result.success) {
        showToast(editingUserId ? 'Пользователь обновлён' : 'Пользователь создан');
        userModal.classList.remove('show');
        await loadData();
      } else {
        showToast(result.error || 'Ошибка сохранения', true);
      }
    });

    // Close Modals
    closeModal.addEventListener('click', () => userModal.classList.remove('show'));
    cancelBtn.addEventListener('click', () => userModal.classList.remove('show'));
    closeProgressModal.addEventListener('click', () => progressModal.classList.remove('show'));

    // Logout
    logoutBtn.addEventListener('click', async () => {
      if (SupabaseClient.isSupabaseConfigured()) {
        await AdminAPI.signOut();
      }
      localStorage.removeItem('adminAuth');
      localStorage.removeItem('bossAuth');
      window.location.reload();
    });

    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    init();
  </script>
</body>
</html>
